name: SEO Blog Agent

on:
  schedule:
    # Mon/Wed/Fri at 9:00 AM CST (15:00 UTC)
    - cron: '0 15 * * 1,3,5'
  workflow_dispatch: # Allow manual triggers

concurrency:
  group: blog-agent
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

jobs:
  generate-blog-post:
    name: Generate Blog Post
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "ReplySequence Blog Agent"
          git config user.email "blog-agent@replysequence.com"

      - name: Run blog agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_POOLER: ${{ secrets.DATABASE_URL_POOLER }}
          ADMIN_CLERK_ID: ${{ secrets.ADMIN_CLERK_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx tsx scripts/blog-agent/index.ts
